services:
  bot:
    build: .
    container_name: clans_bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${WEBHOOK_PORT:-8989}:${WEBHOOK_PORT:-8989}"
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - default
      - dice_shared
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: clans_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-clans_redis_pass}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis_data:
    external: true
    name: clans_bot_redis_data

networks:
  dice_shared:
    external: true
    name: dice_bot_default
